<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Task Manager</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f5f7fa;
        }
        .card {
            border-radius: 12px;
        }
        .done {
            text-decoration: line-through;
            color: gray;
        }
    </style>
</head>
<body>

<div class="container mt-5">
    <div class="card shadow p-4">

        <h2 class="text-center mb-4">📝 Task Manager</h2>
        <p class="text-center text-muted">Simple & clean task tracker</p>

        <!-- Add Task -->
        <form action="/add" method="post" class="d-flex gap-2 mb-4">
            <input type="text" name="task" class="form-control" placeholder="Enter a new task..." required>
            <button class="btn btn-primary">Add</button>
        </form>

        <!-- Task List -->
        <ul class="list-group">
            {% for task in tasks %}
            <li class="list-group-item d-flex justify-content-between align-items-center">
                
                <span class="{% if task[3] == 'done' %}done{% endif %}">
                    {{ task[2] }}
                </span>

                <div>
                    <a href="/done/{{ task[0] }}" class="btn btn-success btn-sm">✔</a>
                    <a href="/delete/{{ task[0] }}" class="btn btn-danger btn-sm">✖</a>
                </div>

            </li>
            {% endfor %}
        </ul>

    </div>
</div>

</body>
</html>
